<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РОСНОУ Расписание</title>
    <link rel="stylesheet" href="styles.css">

    <link rel="icon" type="image/png" href="/source/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/source/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/source/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/source/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="vultourjol" />
    <link rel="manifest" href="/source/favicon/site.webmanifest" />
    <link rel="mask-icon" href="/source/favicon/safari-pinned-tab.svg" color="#4692DD">

</head>
<body>
    <div class="container">
        <header>
            <h1>Расписание занятий</h1>
            <div class="current-date" id="currentDate"></div>
        </header>

        <main>
            <section class="schedule-section">
                <div class="schedule-table-container">
                    <table class="schedule-table" id="scheduleTable">
                        <thead>
                            <tr>
                                <th>Время</th>
                                <th>Предмет</th>
                                <th>Преподаватель</th>
                                <th>Аудитория</th>
                                <th>Тип занятия</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleTableBody">
                        </tbody>
                    </table>
                </div>
                <div class="schedule-list-container" id="scheduleListContainer">
                    <div class="schedule-list" id="scheduleList">
                    </div>
                </div>
            </section>

            <section class="calendar-section">
                <h2>Календарь</h2>
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button id="prevMonth" class="nav-btn">&lt;</button>
                        <h3 id="currentMonth"></h3>
                        <button id="nextMonth" class="nav-btn">&gt;</button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                    </div>
                </div>
            </section>

            <section class="calendar-section">
                <h2>Лекции</h2>
                <button id="dataManagementBtn">Управление данными</button>
                <button id="itBtn">Информационные технологии</button>
            </section>
        </main>
    </div>

    <!-- Модальное окно для лекций -->
    <div id="lectureModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <div id="lectureContent"></div>
        </div>
    </div>

    <script src="september.js"></script>
    <script src="october.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
