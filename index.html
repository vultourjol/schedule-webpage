<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РОСНОУ Расписание</title>
    <link rel="stylesheet" href="styles.css">

    <link rel="icon" type="image/png" href="/source/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/source/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/source/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/source/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="vultourjol" />
    <link rel="manifest" href="/source/favicon/site.webmanifest" />
    <link rel="mask-icon" href="/source/favicon/safari-pinned-tab.svg" color="#4692DD">

</head>
<body>
    <div class="container">
        <header>
            <h1>Расписание занятий</h1>
            <div class="current-date" id="currentDate"></div>
        </header>

        <main>
            <section class="schedule-section">
                <div class="schedule-table-container">
                    <table class="schedule-table" id="scheduleTable">
                        <thead>
                            <tr>
                                <th>Время</th>
                                <th>Предмет</th>
                                <th>Преподаватель</th>
                                <th>Аудитория</th>
                                <th>Тип занятия</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleTableBody">
                        </tbody>
                    </table>
                </div>
                <div class="schedule-list-container" id="scheduleListContainer">
                    <div class="schedule-list" id="scheduleList">
                    </div>
                </div>
            </section>            <section class="calendar-section">
                <div class="calendar-header-wrapper">
                    <h2>Календарь</h2>
                    <div class="calendar-controls">
                        <div class="date-selector">
                            <select id="monthSelector" class="date-select">
                                <option value="0">Январь</option>
                                <option value="1">Февраль</option>
                                <option value="2">Март</option>
                                <option value="3">Апрель</option>
                                <option value="4">Май</option>
                                <option value="5">Июнь</option>
                                <option value="6">Июль</option>
                                <option value="7">Август</option>
                                <option value="8">Сентябрь</option>
                                <option value="9">Октябрь</option>
                                <option value="10">Ноябрь</option>
                                <option value="11">Декабрь</option>
                            </select>
                            <select id="yearSelector" class="date-select"></select>
                        </div>
                        <div class="calendar-view-controls">
                            <button id="todayBtn" class="today-btn">Сегодня</button>
                            <button id="exportBtn" class="export-btn">Экспорт</button>
                        </div>
                    </div>
                </div>
                
                <div class="calendar-filters">
                    <div class="filter-group">
                        <span class="filter-label">Показать:</span>
                        <label class="filter-checkbox">
                            <input type="checkbox" id="filterLecture" checked>
                            <span class="checkmark lecture"></span>
                            Лекции
                        </label>
                        <label class="filter-checkbox">
                            <input type="checkbox" id="filterSeminar" checked>
                            <span class="checkmark seminar"></span>
                            Семинары
                        </label>
                        <label class="filter-checkbox">
                            <input type="checkbox" id="filterPractice" checked>
                            <span class="checkmark practice"></span>
                            Практики
                        </label>
                        <label class="filter-checkbox">
                            <input type="checkbox" id="filterLab" checked>
                            <span class="checkmark lab"></span>
                            Лабораторные
                        </label>
                    </div>
                </div>

                <div class="calendar-container">
                    <div class="calendar-navigation">
                        <button id="prevMonth" class="nav-btn" title="Предыдущий месяц">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <h3 id="currentMonth"></h3>
                        <button id="nextMonth" class="nav-btn" title="Следующий месяц">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                    </div>
                    <div class="calendar-legend">
                        <div class="legend-item">
                            <div class="legend-color today"></div>
                            <span>Сегодня</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color has-classes"></div>
                            <span>Есть занятия</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color weekend"></div>
                            <span>Выходные</span>
                        </div>
                    </div>
                </div>

                <!-- Tooltip для предварительного просмотра -->
                <div id="calendarTooltip" class="calendar-tooltip">
                    <div class="tooltip-header">
                        <span class="tooltip-date"></span>
                        <span class="tooltip-count"></span>
                    </div>
                    <div class="tooltip-content"></div>
                </div>
            </section>

            <section class="calendar-section">
                <h2>Лекции</h2>
                <div class="lectures-container">
                    <button id="dataManagementBtn">Управление данными</button>
                    <button id="itBtn">Информационные технологии</button>
                    <button id="probabilityStatisticsBtn">Вероятность и статистика</button>
                    <button id="computationalMathBtn">Вычислительная математика</button>
                    <button id="differentialEquationsBtn">Дифференциальные уравнения</button>
                    <button id="foreignLanguageBtn">Деловой иностранный язык</button>
                    <button id="informationTheoryBtn">Теория информации</button>
                    <button id="programmingTechnologiesBtn">Технологии программирования</button>
                    <button id="uiripBtn">УИРИП</button>
                </div>
            </section>

            <footer>
                <p>&copy; created by <a href="https://vultourjol.ru">vultourjol</a></p>
            </footer>
        </main>
    </div>

    <div id="lectureModal" class="modal">
        <div class="modal-search-container">
            <input type="text" id="modalSearchInput" placeholder="Поиск по содержимому лекции..." class="modal-search-input">
            <div class="search-controls">
                <span id="searchCounter" class="search-counter"></span>
                <button type="button" id="prevSearchBtn" class="search-nav-btn" title="Предыдущий результат">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button type="button" id="nextSearchBtn" class="search-nav-btn" title="Следующий результат">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M9 18L15 12L9 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <button type="button" id="clearSearchBtn" class="search-clear-btn" title="Очистить поиск">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>
        <div class="modal-wrapper">
            <div class="modal-content">
                <div id="lectureContent"></div>
            </div>
            <button class="modal-close-btn" id="modalCloseBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            
        </div>
    </div>

    <script src="september.js"></script>
    <script src="october.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
